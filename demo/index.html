<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
		<meta name="color-scheme" content="light dark">
		<title>demo</title>
		<link rel="stylesheet" href="./NUI/css/nui-theme.css">
		<link rel="stylesheet" href="css/app.css">
		<style>
			/* Prevent layout shifts by hiding app until upgraded and ready */
			body { margin: 0; padding: 0; overflow: hidden; }
			nui-app:not(.nui-ready) { display: none; }
			nui-loading:not(.active) { display: none; }
		</style>
		<script type="module" src="js/app.js"></script>
	</head>
	<body>
		<!-- Loading indicator (bar mode - top of page) -->
		<nui-loading mode="bar"></nui-loading>
		
		<nui-app nui-vars-sidebar_width="15rem" nui-vars-sidebar_force-breakpoint="75rem" nui-vars-sidebar-right_force-breakpoint="75rem">
			<!-- Skip links for keyboard accessibility (auto-generated for nui-app structure) -->
			<nui-skip-links></nui-skip-links>

            <nui-app-header>
                <div slot="left">
				<nui-button data-action="toggle-sidebar">
					<button type="button" aria-label="Toggle navigation menu">
						<nui-icon name="menu">☰</nui-icon>
					</button>
				</nui-button>
				<h1>demo</h1>
                </div>
                <div slot="center">
                    <!-- Example empty center slot -->
                </div>
                <div slot="right">
                    <nui-button data-action="toggle-theme">
                        <button type="button" aria-label="Toggle light/dark theme">
                            <nui-icon name="brightness">⛭</nui-icon>
                        </button>
                    </nui-button><nui-button data-action="toggle-sidebar:right">
                        <button type="button" aria-label="Toggle right sidebar">
                            <nui-icon name="settings">⚙</nui-icon>
                        </button>
                    </nui-button>
                </div>
            </nui-app-header>

            <nui-sidebar>
                <nui-link-list mode="fold">
                    <!-- Navigation loaded from JSON via JavaScript -->
                </nui-link-list>
            </nui-sidebar>

            <nui-sidebar position="right">
                <div style="padding: var(--nui-space); display: flex; flex-direction: column; gap: var(--nui-space);">
                    <h3 style="margin-top: 0;">Demo Configuration</h3>
                    <p style="font-size: var(--font-size-small); color: var(--color-text-muted);">This right sidebar is a demonstration of the dual-sidebar layout feature. The controls below are non-functional placeholders.</p>
                    
                    <div style="margin-top: var(--nui-space);">
                        <label style="font-weight: bold; font-size: var(--font-size-small); display: block; margin-bottom: var(--nui-space-half);">API Environment</label>
                        <nui-select>
                            <select>
                                <option>Production</option>
                                <option>Staging</option>
                                <option>Development (Local)</option>
                            </select>
                        </nui-select>
                    </div>

                    <div style="margin-top: var(--nui-space);">
                        <label style="font-weight: bold; font-size: var(--font-size-small); display: block; margin-bottom: var(--nui-space-half);">Debugging Options</label>
                        <nui-checkbox style="margin-bottom: var(--nui-space-half);">
                            <input type="checkbox" id="demo-mock-data" checked>
                            <label for="demo-mock-data">Use Mock Data</label>
                        </nui-checkbox>
                        <nui-checkbox style="margin-bottom: var(--nui-space-half);">
                            <input type="checkbox" id="demo-verbose">
                            <label for="demo-verbose">Verbose Logging</label>
                        </nui-checkbox>
                        <nui-checkbox>
                            <input type="checkbox" id="demo-paint">
                            <label for="demo-paint">Show Paint Rects</label>
                        </nui-checkbox>
                    </div>

                    <div style="margin-top: auto; padding-top: var(--nui-space-double);">
                        <nui-button variant="primary" style="width: 100%;">
                            <button type="button">Apply Settings</button>
                        </nui-button>
                    </div>
                </div>
            </nui-sidebar>

            <nui-content>
                <nui-main>
                    <!-- Content pages loaded here -->
                </nui-main>
            
               <!-- <nui-content-footer>
                    <footer>
                        <layout>
                            <item>
                                <h1>NUI Component Playground</h1>
                            </item>
                            <item>
                                <p>&copy; 2025 NUI Playground. All rights reserved.</p>
                            </item>
                        </layout>
                    </footer>
                </nui-content-footer>-->
            </nui-content>
            <nui-app-footer>
                <div id="appFooterInfo">...</div>
                <nui-button class="icon-only" data-action="scroll-to-top" id="scrollToTop">
                    <button type="button" aria-label="Scroll to top">
                        Top<nui-icon name="arrow" style="transform: rotate(-90deg)"></nui-icon>
                    </button>
                </nui-button>
            </nui-app-footer>
		</nui-app>
	</body>
</html>
