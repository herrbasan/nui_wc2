<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <title>NUI Create App</title>
    <link rel="stylesheet" href="./nui-theme.css">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        nui-app:not(.nui-ready) { display: none; }
        
        .wizard-container {
            max-width: 36rem;
            margin: 0 auto;
            padding: var(--nui-space-double);
        }
        
        .wizard-header {
            margin-bottom: var(--nui-space-double);
        }
        
        .wizard-header h1 {
            margin: 0 0 var(--nui-space-half) 0;
        }
        
        .wizard-header p {
            margin: 0;
            color: var(--color-text-muted);
        }
        
        .form-section {
            margin-bottom: var(--nui-space-double);
        }
        
        .form-section h3 {
            margin: 0 0 var(--nui-space) 0;
            font-size: var(--font-size-small);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-muted);
        }
        
        .layout-preview {
            border: var(--border-thickness) solid var(--border-shade1);
            border-radius: var(--border-radius1);
            padding: var(--nui-space-double);
            background: var(--color-shade1);
        }
        
        .layout-option {
            margin-bottom: var(--nui-space);
        }
        
        .layout-option:last-child {
            margin-bottom: 0;
        }
        
        .layout-diagram {
            display: grid;
            gap: 2px;
            margin-top: var(--nui-space);
            padding: var(--nui-space);
            background: var(--color-shade2);
            border-radius: var(--border-radius0);
            font-family: var(--font-mono);
            font-size: var(--font-size-xsmall);
        }
        
        .layout-diagram .header { 
            background: var(--color-accent-shade9); 
            color: var(--color-white);
            padding: var(--nui-space-half);
            text-align: center;
        }
        
        .layout-diagram .sidebar { 
            background: var(--color-shade4); 
            padding: var(--nui-space-half);
            text-align: center;
            min-height: 4rem;
        }
        
        .layout-diagram .content { 
            background: var(--color-shade3); 
            padding: var(--nui-space-half);
            text-align: center;
            min-height: 4rem;
        }
        
        .layout-diagram .footer { 
            background: var(--color-shade5); 
            padding: var(--nui-space-half);
            text-align: center;
        }
        
        .status-banner {
            margin-top: var(--nui-space);
            padding: var(--nui-space);
            border-radius: var(--border-radius1);
            display: none;
        }
        
        .status-banner.show {
            display: block;
        }
        
        .status-banner.success {
            background: var(--color-success-shade9);
            color: var(--color-success);
        }
        
        .status-banner.error {
            background: var(--color-alert-shade9);
            color: var(--color-alert);
        }
        
        .status-banner code {
            display: block;
            margin-top: var(--nui-space-half);
            padding: var(--nui-space);
            background: var(--color-shade1);
            border-radius: var(--border-radius0);
            font-family: var(--font-mono);
            font-size: var(--font-size-small);
        }
        
        .create-button {
            margin-top: var(--nui-space-double);
        }
    </style>
    <script type="module">
        import { nui } from './nui.js';
        
        function updatePreview() {
            const leftSidebar = document.getElementById('leftSidebar').checked;
            const rightSidebar = document.getElementById('rightSidebar').checked;
            const footer = document.getElementById('footer').checked;
            
            const diagram = document.getElementById('layoutDiagram');
            
            // Build grid based on selections
            let grid = '';
            
            // Header always present
            grid += `<div class="header" style="grid-column: 1 / -1;">nui-app-header</div>`;
            
            // Middle row: sidebar(s) + content
            if (leftSidebar && rightSidebar) {
                grid += `
                    <div class="sidebar" style="grid-column: 1;">nui-sidebar (left)</div>
                    <div class="content" style="grid-column: 2;">nui-content / nui-main</div>
                    <div class="sidebar" style="grid-column: 3;">nui-sidebar (right)</div>
                `;
                diagram.style.gridTemplateColumns = '1fr 2fr 1fr';
            } else if (leftSidebar) {
                grid += `
                    <div class="sidebar" style="grid-column: 1;">nui-sidebar</div>
                    <div class="content" style="grid-column: 2;">nui-content / nui-main</div>
                `;
                diagram.style.gridTemplateColumns = '1fr 3fr';
            } else if (rightSidebar) {
                grid += `
                    <div class="content" style="grid-column: 1;">nui-content / nui-main</div>
                    <div class="sidebar" style="grid-column: 2;">nui-sidebar</div>
                `;
                diagram.style.gridTemplateColumns = '3fr 1fr';
            } else {
                grid += `<div class="content" style="grid-column: 1 / -1;">nui-content / nui-main</div>`;
                diagram.style.gridTemplateColumns = '1fr';
            }
            
            // Footer optional
            if (footer) {
                grid += `<div class="footer" style="grid-column: 1 / -1;">nui-app-footer</div>`;
            }
            
            diagram.innerHTML = grid;
        }
        
        async function createProject() {
            const nameInput = document.getElementById('projectName');
            const name = nameInput.value.trim();
            const status = document.getElementById('status');
            
            const leftSidebar = document.getElementById('leftSidebar').checked;
            const rightSidebar = document.getElementById('rightSidebar').checked;
            const footer = document.getElementById('footer').checked;
            
            if (!name) {
                status.className = 'status-banner show error';
                status.innerHTML = '<nui-icon name="error"></nui-icon> Please enter a project name';
                return;
            }
            
            if (!/^[a-zA-Z0-9_-]+$/.test(name)) {
                status.className = 'status-banner show error';
                status.innerHTML = '<nui-icon name="error"></nui-icon> Project name can only contain letters, numbers, hyphens and underscores';
                return;
            }
            
            status.className = 'status-banner show';
            status.innerHTML = '<nui-icon name="pending" class="spin"></nui-icon> Creating project...';
            
            const res = await fetch('/api/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    name, 
                    layout: {
                        leftSidebar,
                        rightSidebar,
                        footer
                    }
                })
            });
            
            const data = await res.json();
            
            if (data.success) {
                status.className = 'status-banner show success';
                status.innerHTML = 
                    '<nui-icon name="check"></nui-icon> <strong>Project created!</strong>' +
                    '<code>cd ' + data.projectPath + ' && npx serve .</code>';
                nameInput.value = '';
            } else {
                status.className = 'status-banner show error';
                status.innerHTML = '<nui-icon name="error"></nui-icon> ' + data.error;
            }
        }
        
        // Attach listeners
        document.getElementById('leftSidebar').addEventListener('change', updatePreview);
        document.getElementById('rightSidebar').addEventListener('change', updatePreview);
        document.getElementById('footer').addEventListener('change', updatePreview);
        document.getElementById('createBtn').addEventListener('click', createProject);
        
        // Initial preview
        updatePreview();
    </script>
</head>
<body>
    <nui-app>
        <nui-skip-links></nui-skip-links>
        
        <nui-app-header>
            <div slot="left">
                <nui-icon name="construction"></nui-icon>
                <h1>NUI Create App</h1>
            </div>
        </nui-app-header>
        
        <nui-content>
            <div class="wizard-container">
                <header class="wizard-header">
                    <h1>Create New Project</h1>
                    <p>Configure your NUI application shell</p>
                </header>
                
                <section class="form-section">
                    <h3>Project Name</h3>
                    <nui-input>
                        <input type="text" id="projectName" placeholder="my-nui-app" 
                            pattern="[a-zA-Z0-9_-]+" 
                            title="Letters, numbers, hyphens and underscores only">
                    </nui-input>
                </section>
                
                <section class="form-section">
                    <h3>Layout Options</h3>
                    <nui-card class="layout-preview">
                        <div class="layout-option">
                            <nui-checkbox>
                                <input type="checkbox" id="leftSidebar" checked>
                                <label for="leftSidebar">Left sidebar (navigation)</label>
                            </nui-checkbox>
                        </div>
                        <div class="layout-option">
                            <nui-checkbox>
                                <input type="checkbox" id="rightSidebar">
                                <label for="rightSidebar">Right sidebar (dual-sidebar layout)</label>
                            </nui-checkbox>
                        </div>
                        <div class="layout-option">
                            <nui-checkbox>
                                <input type="checkbox" id="footer">
                                <label for="footer">App footer</label>
                            </nui-checkbox>
                        </div>
                        
                        <div id="layoutDiagram" class="layout-diagram"></div>
                    </nui-card>
                </section>
                
                <nui-button class="create-button">
                    <button type="button" id="createBtn">Create Project</button>
                </nui-button>
                
                <div id="status" class="status-banner"></div>
            </div>
        </nui-content>
    </nui-app>
</body>
</html>
