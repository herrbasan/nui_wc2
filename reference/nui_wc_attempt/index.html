<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebComponent Example</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/nui-base.css">
    <script src="js/main.js" type="module" defer></script>
</head>
<body class="">
    <nui-app>
        <nui-top-nav id="topnav" height="4rem">
            <ul>
                <li><nui-button icon="menu" class="iconOnly" action="toggleMenu" target="#sidenav">Toggle Menu</nui-button></li>
                <li>Page Title</li>
            </ul>
            <ul>
                <li>user@example.com</li>
                <li><nui-button icon="brightness" class="iconOnly" action="toggleTheme">Toggle Light/Dark Mode</nui-button></li>
            </ul>
        </nui-top-nav>

        <nui-content>
            <div class="container">
                <header is="nui-header">
                    <h1>Welcome to My WebComponent Example</h1>
                </header>
                <main>
                    <section id="about">
                        <h2>About</h2>
                        <p>This is a simple webpage demonstrating the use of HTML elements.</p>
                        <nui-button action="typeOfAction">Click Me!</nui-button>
                    </section>
                </main>
                <footer>
                    <hr>
                    <p>&copy; 2025 Simple Webpage. This is a demonstration of basic HTML elements.</p>
                </footer>
            </div>
        </nui-content>
        
        <nui-side-nav id="sidenav" width="15rem" force-breakpoint="75rem" data-nui-stuff="things" data-counter="1">
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nui-side-nav>
    </nui-app>
</body>
</html>
