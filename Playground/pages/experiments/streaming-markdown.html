<div class="page-streaming">
	<header>
		<h1>Streaming Markdown Demo</h1>
		<p class="lead">Simulates LLM-style streaming with markdown rendering.</p>
	</header>

	<section>
		<div style="display: flex; gap: var(--nui-space); margin-bottom: var(--nui-space); align-items: center; flex-wrap: wrap;">
			<nui-button id="btn-start"><button type="button">Start</button></nui-button>
			<nui-button id="btn-pause"><button type="button" disabled>Pause</button></nui-button>
			<nui-button id="btn-reset"><button type="button">Reset</button></nui-button>
			<div style="display: flex; gap: var(--nui-space-half); align-items: center;">
				<label for="tempo-select" style="font-size: var(--font-size-small);">Tempo:</label>
				<nui-select id="tempo-select" style="min-width: 120px;">
					<select>
						<option value="instant" selected>Instant</option>
						<option value="100">Slow</option>
						<option value="50">Normal</option>
						<option value="20">Fast</option>
						<option value="5">Very Fast</option>
					</select>
				</nui-select>
			</div>
		</div>

		<div class="streaming-grid">
			<div>
				<h3>Rendered</h3>
				<nui-card><div id="output" style="padding: var(--nui-space); min-height: 400px;"></div></nui-card>
			</div>
			<div>
				<h3>Raw</h3>
				<nui-card><pre id="raw" style="margin: 0; padding: var(--nui-space); font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; word-break: break-all; overflow-y: auto; background: var(--color-shade2); height: 100%; box-sizing: border-box;"></pre></nui-card>
			</div>
		</div>

		<div style="margin-top: var(--nui-space);">
			<p>Stats: Chunks: <span id="stat-chunks">0</span> | Chars: <span id="stat-chars">0</span></p>
		</div>
	</section>
</div>

<style>
.streaming-grid {
	display: grid;
	grid-template-columns: 50% 50%;
	gap: var(--nui-space);
}

.streaming-grid > div {
	display: flex;
	flex-direction: column;
	min-width: 0;
}

.streaming-grid h3 {
	margin-bottom: var(--nui-space-half);
}

.streaming-grid nui-card {
	flex: 1;
	display: flex;
	flex-direction: column;
}

.streaming-grid nui-card > * {
	flex: 1;
}

#output {
	min-height: 400px;
}
</style>

<script type="nui/page">
function init(element) {
	var btnStart = element.querySelector('#btn-start');
	var btnPause = element.querySelector('#btn-pause');
	var btnReset = element.querySelector('#btn-reset');
	var tempoSelect = element.querySelector('#tempo-select');
	var output = element.querySelector('#output');
	var raw = element.querySelector('#raw');
	var statChunks = element.querySelector('#stat-chunks');
	var statChars = element.querySelector('#stat-chars');

	var streamText = '';
	var streamIndex = 0;
	var isPaused = false;
	var streamInterval = null;
	var chunkCount = 0;

	var sampleMarkdown = [
		'# Quick Start',
		'',
		'Get up and running quickly with this simple guide.',
		'',
		'---',
		'',
		'## Configuration',
		'',
		'| Option | Default | Description |',
		'|--------|---------|-------------|',
		'| theme | light | Color scheme |',
		'| locale | en | Language setting |',
		'| debug | false | Enable debug mode |',
		'',
		'***',
		'',
		'## JavaScript',
		'',
		'```javascript',
		'const config = { theme: "dark" };',
		'console.log("Ready!");',
		'```',
		'',
		'## CSS',
		'',
		'```css',
		'.btn { padding: 0.5rem 1rem; }',
		'```',
		'',
		'## HTML',
		'',
		'```html',
		'<button class="btn">Click me</button>',
		'```',
		'',
		'___',
		'',
		'**Done!**',
		''
	].join('\n');

	function renderMarkdown(text) {
		output.innerHTML = nui.util.markdownToHtml(text);
		chunkCount++;
		statChunks.textContent = chunkCount;
		statChars.textContent = text.length;
	}

	function getTempo() {
		return tempoSelect.querySelector('select').value;
	}

	function streamNext() {
		if (streamIndex >= sampleMarkdown.length) {
			clearInterval(streamInterval);
			streamInterval = null;
			btnStart.querySelector('button').disabled = false;
			btnPause.querySelector('button').disabled = true;
			return;
		}

		var chunkSize = Math.floor(Math.random() * 5) + 1;
		var chunk = sampleMarkdown.substring(streamIndex, streamIndex + chunkSize);
		streamText += chunk;
		streamIndex += chunkSize;

		raw.textContent = streamText;
		raw.scrollTop = raw.scrollHeight;

		renderMarkdown(streamText);
	}

	function startStreaming() {
		if (streamInterval) clearInterval(streamInterval);

		streamIndex = 0;
		streamText = '';
		isPaused = false;
		chunkCount = 0;

		var tempo = getTempo();

		btnStart.querySelector('button').disabled = true;
		btnPause.querySelector('button').disabled = false;
		btnPause.querySelector('button').textContent = 'Pause';

		if (tempo === 'instant') {
			streamText = sampleMarkdown;
			streamIndex = sampleMarkdown.length;
			raw.textContent = streamText;
			renderMarkdown(streamText);
			chunkCount = 1;
			statChunks.textContent = chunkCount;
			statChars.textContent = streamText.length;
			btnStart.querySelector('button').disabled = false;
			btnPause.querySelector('button').disabled = true;
		} else {
			streamInterval = setInterval(function() {
				if (!isPaused) streamNext();
			}, parseInt(tempo, 10) || 100);
		}
	}

	btnStart.querySelector('button').addEventListener('click', startStreaming);

	btnPause.querySelector('button').addEventListener('click', function() {
		isPaused = !isPaused;
		btnPause.querySelector('button').textContent = isPaused ? 'Resume' : 'Pause';
	});

	btnReset.querySelector('button').addEventListener('click', function() {
		if (streamInterval) {
			clearInterval(streamInterval);
			streamInterval = null;
		}
		streamIndex = 0;
		streamText = '';
		isPaused = false;
		chunkCount = 0;

		btnStart.querySelector('button').disabled = false;
		btnPause.querySelector('button').disabled = true;
		btnPause.querySelector('button').textContent = 'Pause';

		raw.textContent = '';
		output.innerHTML = '';
		statChunks.textContent = '0';
		statChars.textContent = '0';
	});
}
</script>
